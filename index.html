<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />

  <title>Rail Map Viewer</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <style>
    html, body {
      height: 100%;
      margin: 0;
      font-family: Arial, sans-serif;
    }

    #map {
      height: 100%;
      width: 100%;
    }

    .top-panel {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 1000;
      display: flex;
      gap: 6px;
      pointer-events: none;
      max-width: 360px;
      width: calc(100% - 150px);
    }

    .top-panel input,
    .top-panel button {
      pointer-events: auto;
      font-size: 15px;
      padding: 8px;
      border: 1px solid #555;
      border-radius: 6px;
      background: white;
    }

    .top-panel input {
      flex: 1;
      min-width: 0;
    }

    .top-panel button {
      white-space: nowrap;
    }

    .search-wrapper {
      position: relative;
      flex: 1;
      min-width: 0;
    }

    #searchBox {
      width: 100%;
      box-sizing: border-box;
    }

    #suggestions {
      display: none;
      position: absolute;
      top: 39px;
      left: 0;
      right: 0;
      max-height: 220px;
      overflow-y: auto;
      background: white;
      border: 1px solid #666;
      border-radius: 6px;
      z-index: 1200;
      pointer-events: auto;
      font-size: 15px;
    }

    .suggestion-item {
      padding: 8px;
      cursor: pointer;
      border-bottom: 1px solid #ddd;
    }

    .suggestion-item:hover {
      background: #eee;
    }

    .leaflet-popup-content {
      font-size: 16px;
      line-height: 1.4;
    }

    .popup-title {
      font-weight: bold;
      font-size: 18px;
      margin-bottom: 6px;
    }

    .popup-link {
      display: block;
      margin-top: 6px;
    }

    @media (max-width: 600px) {
      .top-panel {
        max-width: 270px;
        width: calc(100% - 115px);
      }

      .top-panel input,
      .top-panel button {
        font-size: 14px;
        padding: 7px;
      }
    }
  </style>
</head>

<body>
  <div id="map"></div>

  <div class="top-panel">
    <div class="search-wrapper">
      <input
        id="searchBox"
        type="text"
        placeholder="Search..."
        autocomplete="off"
        oninput="updateSuggestions()"
        onkeydown="handleSearchKey(event)"
      />
      <div id="suggestions"></div>
    </div>
    <button onclick="searchFeature()">Find</button>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    const DEFAULT_LAT = 55.853540195666056;
    const DEFAULT_LNG = -4.259548672153644;
    const DEFAULT_ZOOM = 18;
    const MAX_MAP_ZOOM = 19;

    const map = L.map('map', {
      zoomControl: false,
      maxZoom: MAX_MAP_ZOOM
    }).setView([DEFAULT_LAT, DEFAULT_LNG], DEFAULT_ZOOM);

    L.control.zoom({
      position: 'bottomright'
    }).addTo(map);

    const satellite = L.tileLayer(
      'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
      {
        maxZoom: MAX_MAP_ZOOM,
        maxNativeZoom: MAX_MAP_ZOOM,
        attribution: 'Tiles &copy; Esri'
      }
    );

    const street = L.tileLayer(
      'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
      {
        maxZoom: MAX_MAP_ZOOM,
        maxNativeZoom: 19,
        attribution: '&copy; OpenStreetMap contributors'
      }
    );

    satellite.addTo(map);

    const baseMaps = {
      "Satellite": satellite,
      "Street map": street
    };

    const overlayMaps = {};
    const allFeatures = [];
    let geojsonLayer;

    function getColour(feature) {
      const p = feature.properties || {};

      if (p.stroke) return p.stroke;
      if (p["stroke"]) return p["stroke"];
      if (p.colour) return p.colour;
      if (p.color) return p.color;

      return "#ffff00";
    }

    function styleFeature(feature) {
      return {
        color: getColour(feature),
        weight: 5,
        opacity: 0.95
      };
    }

    function getFeatureName(feature) {
      const p = feature.properties || {};

      return (
        p.name ||
        p.Name ||
        p.title ||
        p.Title ||
        p.asset_id ||
        p.AssetID ||
        p.description ||
        p.Description ||
        "Unnamed feature"
      );
    }

    function popupContent(feature) {
      const p = feature.properties || {};

      const name = getFeatureName(feature);

      const description =
        p.description ||
        p.Description ||
        p.notes ||
        p.Notes ||
        "";

      const drawingUrl =
        p.drawing_url ||
        p.DrawingURL ||
        p.photo_url ||
        p.PhotoURL ||
        p.link ||
        p.Link ||
        "";

      let html = `<div class="popup-title">${name}</div>`;

      if (description && description !== name) {
        html += `<div>${description}</div>`;
      }

      if (drawingUrl) {
        html += `<a class="popup-link" href="${drawingUrl}" target="_blank">Open link</a>`;
      }

      return html;
    }

    function zoomToLayer(layer) {
      if (layer.getBounds) {
        map.fitBounds(layer.getBounds(), {
          padding: [50, 50],
          maxZoom: MAX_MAP_ZOOM
        });
      } else if (layer.getLatLng) {
        map.setView(layer.getLatLng(), MAX_MAP_ZOOM);
      }

      layer.openPopup();
    }

    function updateSuggestions() {
      const searchText = document.getElementById('searchBox').value.trim().toLowerCase();
      const suggestionsBox = document.getElementById('suggestions');

      suggestionsBox.innerHTML = "";

      if (!searchText) {
        suggestionsBox.style.display = "none";
        return;
      }

      const matches = allFeatures
        .filter(item => {
          const p = item.feature.properties || {};
          const searchable = JSON.stringify(p).toLowerCase();
          return searchable.includes(searchText);
        })
        .slice(0, 8);

      if (matches.length === 0) {
        suggestionsBox.style.display = "none";
        return;
      }

      matches.forEach(item => {
        const div = document.createElement('div');
        div.className = 'suggestion-item';
        div.textContent = getFeatureName(item.feature);

        div.onclick = function() {
          document.getElementById('searchBox').value = getFeatureName(item.feature);
          suggestionsBox.style.display = "none";
          zoomToLayer(item.layer);
        };

        suggestionsBox.appendChild(div);
      });

      suggestionsBox.style.display = "block";
    }

    function handleSearchKey(event) {
      if (event.key === "Enter") {
        document.getElementById('suggestions').style.display = "none";
        searchFeature();
      }

      if (event.key === "Escape") {
        document.getElementById('suggestions').style.display = "none";
      }
    }

    document.addEventListener('click', function(event) {
      const searchPanel = document.querySelector('.top-panel');

      if (!searchPanel.contains(event.target)) {
        document.getElementById('suggestions').style.display = "none";
      }
    });

    fetch('access.geojson')
      .then(response => {
        if (!response.ok) {
          throw new Error(`Could not load access.geojson. HTTP status: ${response.status}`);
        }
        return response.json();
      })
      .then(data => {
        geojsonLayer = L.geoJSON(data, {
          style: styleFeature,

          pointToLayer: function(feature, latlng) {
            return L.circleMarker(latlng, {
              radius: 7,
              color: getColour(feature),
              weight: 3,
              fillOpacity: 0.9
            });
          },

          onEachFeature: function(feature, layer) {
            layer.bindPopup(popupContent(feature));
            allFeatures.push({ feature, layer });
          }
        }).addTo(map);

        overlayMaps["Access points"] = geojsonLayer;

        L.control.layers(baseMaps, overlayMaps, {
          collapsed: false
        }).addTo(map);

        // Fixed default load position.
        // This deliberately does NOT fit to all points.
        map.setView([DEFAULT_LAT, DEFAULT_LNG], DEFAULT_ZOOM);
      })
      .catch(error => {
        console.error(error);
        alert(error.message);
      });

    function searchFeature() {
      const searchText = document.getElementById('searchBox').value.trim().toLowerCase();

      if (!searchText) return;

      const found = allFeatures.find(item => {
        const p = item.feature.properties || {};
        const searchable = JSON.stringify(p).toLowerCase();
        return searchable.includes(searchText);
      });

      if (!found) {
        alert("No matching item found");
        return;
      }

      zoomToLayer(found.layer);
    }
  </script>
</body>
</html>
