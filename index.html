<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />

  <title>Rail Map Viewer</title>

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <style>
    html,
    body {
      height: 100%;
      margin: 0;
      font-family: Arial, sans-serif;
    }

    #map {
      height: 100%;
      width: 100%;
    }

    .top-panel {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 1000;
      display: flex;
      gap: 6px;
      pointer-events: none;
      max-width: 360px;
      width: calc(100% - 150px);
    }

    .top-panel input,
    .top-panel button {
      pointer-events: auto;
      font-size: 15px;
      padding: 8px;
      border: 1px solid #555;
      border-radius: 6px;
      background: white;
    }

    .top-panel input {
      flex: 1;
      min-width: 0;
    }

    .top-panel button {
      white-space: nowrap;
    }

    .search-wrapper {
      position: relative;
      flex: 1;
      min-width: 0;
    }

    #searchBox {
      width: 100%;
      box-sizing: border-box;
    }

    #suggestions {
      display: none;
      position: absolute;
      top: 39px;
      left: 0;
      right: 0;
      max-height: 220px;
      overflow-y: auto;
      background: white;
      border: 1px solid #666;
      border-radius: 6px;
      z-index: 1200;
      pointer-events: auto;
      font-size: 15px;
    }

    .suggestion-item {
      padding: 8px;
      cursor: pointer;
      border-bottom: 1px solid #ddd;
    }

    .suggestion-item:hover {
      background: #eee;
    }

    .leaflet-popup-content {
      max-width: 320px;
      font-size: 14px;
      line-height: 1.4;
      overflow-wrap: break-word;
    }

    .leaflet-popup-content a {
      word-break: break-word;
    }

    .popup-title {
      font-weight: bold;
      font-size: 16px;
      margin-bottom: 6px;
    }

    .popup-row {
      margin-top: 4px;
    }

    .popup-description {
      margin-top: 6px;
    }

    .popup-description img,
    .popup-photo {
      max-width: 100%;
      height: auto;
      display: block;
      margin-top: 8px;
      border-radius: 4px;
    }

    .popup-link {
      display: block;
      margin-top: 6px;
    }

    .br-station-icon {
      background: transparent;
      border: none;
    }

    .br-logo-marker {
      width: 15px;
      height: auto;
      display: block;
      filter: drop-shadow(0 1px 3px rgba(0, 0, 0, 0.65));
    }

    .solid-circle-marker {
      display: block;
      width: 10px;
      height: 10px;
      border: 2px solid #ffffff;
      border-radius: 50%;
      box-sizing: border-box;
      background: var(--marker-colour, #ffff00);
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.45);
    }

    .feature-label {
      background: rgba(255, 255, 255, 0.85);
      border: 1px solid #555;
      border-radius: 4px;
      box-shadow: none;
      color: #111;
      font-size: 11px;
      font-weight: bold;
      line-height: 1.1;
      padding: 2px 4px;
      white-space: nowrap;
    }

    .feature-label::before {
      display: none;
    }

    .locate-button {
      background: white;
      border: 2px solid rgba(0, 0, 0, 0.2);
      border-radius: 4px;
      cursor: pointer;
      width: 42px;
      height: 42px;
      font-size: 22px;
      line-height: 38px;
      text-align: center;
      box-shadow: none;
    }

    .locate-button:hover {
      background: #f4f4f4;
    }

    .map-controls-panel {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 1300;
      font-size: 13px;
      line-height: 1.4;
      pointer-events: auto;
    }

    .map-controls-button {
      display: block;
      margin-left: auto;
      background: white;
      border: 2px solid rgba(0, 0, 0, 0.2);
      border-radius: 4px;
      cursor: pointer;
      padding: 7px 9px;
      font-size: 13px;
      font-weight: bold;
      line-height: 1.2;
      box-shadow: none;
    }

    .map-controls-button:hover {
      background: #f4f4f4;
    }

    .map-controls-button.open {
      background: #e9f2ff;
    }

    .map-controls-content {
      display: none;
      margin-top: 6px;
    }

    .map-controls-content.open {
      display: block;
    }

    .map-control-box {
      background: white;
      border: 2px solid rgba(0, 0, 0, 0.2);
      border-radius: 4px;
      padding: 8px;
      margin-top: 6px;
      max-height: 260px;
      overflow-y: auto;
    }

    .map-control-title {
      font-weight: bold;
      margin-bottom: 4px;
    }

    .map-control-row {
      display: block;
      white-space: nowrap;
      margin-top: 2px;
    }

    .map-control-row input {
      margin-right: 5px;
      vertical-align: middle;
    }

    .map-control-separator {
      border-top: 1px solid #ddd;
      margin: 6px -8px 5px -8px;
    }

    .label-control {
      background: white;
      border: 2px solid rgba(0, 0, 0, 0.2);
      border-radius: 4px;
      padding: 8px;
      font-size: 13px;
      line-height: 1.4;
      max-height: 260px;
      overflow-y: auto;
    }

    .label-control-title {
      font-weight: bold;
      margin-bottom: 4px;
    }

    .label-control-row {
      display: block;
      white-space: nowrap;
      margin-top: 2px;
    }

    .label-control-row input {
      margin-right: 5px;
      vertical-align: middle;
    }

    @media (max-width: 600px) {
      .top-panel {
        max-width: 270px;
        width: calc(100% - 115px);
      }

      .top-panel input,
      .top-panel button {
        font-size: 14px;
        padding: 7px;
      }

      .leaflet-control-layers {
      background: white;
      border: 2px solid rgba(0, 0, 0, 0.2);
      border-radius: 4px;
      padding: 8px;
      font-size: 13px;
      line-height: 1.4;
      max-height: 260px;
      overflow-y: auto;
      }
    }
  </style>
</head>

<body>
  <div id="map"></div>

  <div class="top-panel">
    <div class="search-wrapper">
      <input
        id="searchBox"
        type="text"
        placeholder="Search..."
        autocomplete="off"
        oninput="updateSuggestions()"
        onkeydown="handleSearchKey(event)"
      />
      <div id="suggestions"></div>
    </div>

    <button onclick="searchFeature()">Find</button>
  </div>

  <div class="map-controls-panel">
    <button id="mapControlsButton" class="map-controls-button" type="button">Layers</button>

    <div id="mapControlsContent" class="map-controls-content">
      <div class="map-control-box">
        <div class="map-control-title">Layers</div>
        <div id="baseLayerControls"></div>
        <div class="map-control-separator"></div>
        <div id="overlayLayerControls"></div>
      </div>

      <div class="map-control-box">
        <div class="map-control-title">Labels</div>
        <div id="labelLayerControls"></div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    /*
      MAIN SETTINGS
      Change these if you want the map to open somewhere else.
    */
    const DEFAULT_LAT = 55.84755;
    const DEFAULT_LNG = -4.26126;
    const DEFAULT_ZOOM = 15;
    const MAX_MAP_ZOOM = 20;
    const LABEL_MIN_ZOOM = 17;
    const RAIL_GRAPH_CONNECT_TOLERANCE_METRES = 10;

    /*
      GEOJSON LAYERS
      These filenames assume all .geojson files are in the same folder as index.html.
      Layer order below controls the order in the layer box.
    */
    const LAYER_CONFIGS = [
      {
        name: "Access",
        file: "access.geojson",
        colour: "#00ffff",
        pane: "accessPane",
        zIndex: 650,
        showOnLoad: true,
        showLabels: true
      },
      {
        name: "Stations",
        file: "stations.geojson",
        pane: "stationsPane",
        zIndex: 645,
        showOnLoad: true,
        showLabels: false,
        iconType: "brLogo"
      },

      {
        name: "Points",
        file: "points.geojson",
        colour: "#ff00ff",
        pane: "pointsPane",
        zIndex: 640,
        showOnLoad: true,
        showLabels: true
      },
      {
        name: "Signals",
        file: "signals.geojson",
        colour: "#ff9900",
        pane: "signalsPane",
        zIndex: 630,
        showOnLoad: true,
        showLabels: false
      },
      {
        name: "Locs",
        file: "locs.geojson",
        colour: "#000000",
        pane: "locsPane",
        zIndex: 620,
        showOnLoad: true,
        showLabels: false
      },
      {
        name: "Tracks",
        file: "tracks.geojson",
        pane: "tracksPane",
        zIndex: 610,
        showOnLoad: true,
        showLabels: false
      },
      {
        name: "Chromium",
        file: "chromium.geojson",
        colour: "#ff0000",
        pane: "chromiumPane",
        zIndex: 600,
        showOnLoad: true,
        showLabels: false
      }
    ];

    const map = L.map("map", {
      zoomControl: false,
      maxZoom: MAX_MAP_ZOOM
    }).setView([DEFAULT_LAT, DEFAULT_LNG], DEFAULT_ZOOM);

    /*
      ACTUAL VISUAL LAYER ORDER
      Higher zIndex draws above lower zIndex.

      Top to bottom:
        Access
        Points
        Signals
        Locs
        Tracks
        Chromium
    */
    function createLayerPanes() {
      LAYER_CONFIGS.forEach(layerConfig => {
        if (!layerConfig.pane || map.getPane(layerConfig.pane)) {
          return;
        }

        map.createPane(layerConfig.pane);
        map.getPane(layerConfig.pane).style.zIndex = layerConfig.zIndex;
      });
    }

    createLayerPanes();
    map.createPane("pointMarkerPane");
    map.getPane("pointMarkerPane").style.zIndex = 690;

    map.createPane("userLocationPane");
    map.getPane("userLocationPane").style.zIndex = 700;

    L.control.zoom({
      position: "bottomright"
    }).addTo(map);

    /*
      BASE MAPS
    */
    const satellite = L.tileLayer(
      "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
      {
        maxZoom: MAX_MAP_ZOOM,
        maxNativeZoom: 19,
        attribution: "Tiles &copy; Esri"
      }
    );

    const street = L.tileLayer(
      "https://tile.openstreetmap.org/{z}/{x}/{y}.png",
      {
        maxZoom: MAX_MAP_ZOOM,
        maxNativeZoom: 19,
        attribution: "&copy; OpenStreetMap contributors"
      }
    );

    const lightGray = L.tileLayer(
      "https://services.arcgisonline.com/ArcGIS/rest/services/Canvas/World_Light_Gray_Base/MapServer/tile/{z}/{y}/{x}",
      {
        maxZoom: MAX_MAP_ZOOM,
        maxNativeZoom: 16,
        attribution: "Tiles &copy; Esri"
      }
    );

    const roadLabels = L.tileLayer(
      "https://{s}.basemaps.cartocdn.com/light_only_labels/{z}/{x}/{y}{r}.png",
      {
        maxZoom: MAX_MAP_ZOOM,
        maxNativeZoom: 20,
        subdomains: "abcd",
        attribution: "&copy; OpenStreetMap contributors &copy; CARTO"
      }
    );

    const baseMaps = {
      "Satellite": satellite,
      "Street map": street,
      "Light gray map": lightGray
    };

    const tileOverlayMaps = {
      "Road labels": roadLabels
    };

    satellite.addTo(map);

    let currentBaseLayer = satellite;

    const overlayMaps = {};
    const allFeatures = [];
    const labelledFeatures = [];
    const accessFeatures = [];
    const railDistanceFeatures = [];
    const trackFeatures = [];
    const accessLayerById = {};
    const labelSettings = {};

    LAYER_CONFIGS.forEach(layerConfig => {
      labelSettings[layerConfig.name] = !!layerConfig.showLabels;
    });

    let userLocationMarker = null;
    let userAccuracyCircle = null;

    function getFeatureName(feature) {
      const p = feature.properties || {};

      return (
        p.name ||
        p.Name ||
        p.title ||
        p.Title ||
        p.asset_id ||
        p.AssetID ||
        p.code ||
        p.Code ||
        p.id ||
        p.ID ||
        "Unnamed feature"
      );
    }

    function getSearchText(item) {
      const p = item.feature.properties || {};

      return [
        item.layerName,
        p.name,
        p.Name,
        p["ref:crs"],
        p.type,
        p.Type
      ]
        .filter(Boolean)
        .join(" ")
        .toLowerCase();
    }

    function getPrimarySearchName(item) {
      return getFeatureName(item.feature).toLowerCase();
    }

    function getSearchLayerPriority(layerName) {
      const priorities = {
        "Points": 1,
        "Access": 2,
        "Signals": 3,
        "Locs": 4,
        "Tracks": 5,
        "Stations": 6
      };

      return priorities[layerName] || 99;
    }

    function normaliseSearchValue(value) {
      return String(value || "")
        .trim()
        .toLowerCase()
        .replace(/\s+/g, " ");
    }

    function getSearchRank(item, searchText) {
      const primaryName = normaliseSearchValue(getPrimarySearchName(item));
      const searchable = getSearchText(item);
      const layerPriority = getSearchLayerPriority(item.layerName);

      if (primaryName === searchText) {
        return 0 + layerPriority / 100;
      }

      if (primaryName.startsWith(searchText)) {
        return 1 + layerPriority / 100;
      }

      if (searchable.split(/\s+/).includes(searchText)) {
        return 2 + layerPriority / 100;
      }

      if (searchable.includes(searchText)) {
        return 3 + layerPriority / 100;
      }

      return 999;
    }

    function getFeatureColour(feature, layerConfig) {
      const p = feature.properties || {};

      /*
        Marker/line colour is controlled from LAYER_CONFIGS first.
        This keeps the map styling easy to amend without editing GeoJSON.
      */
      return (
        layerConfig.colour ||
        p.colour ||
        p.color ||
        p.line_colour ||
        p.stroke ||
        p["stroke"] ||
        "#ffff00"
      );
    }

    function getFeatureLineWidth(feature) {
      const p = feature.properties || {};
      const width = Number(p.line_width || p["stroke-width"]);

      if (Number.isFinite(width) && width > 0) {
        return width;
      }

      return 4;
    }

    function styleFeature(feature, layerConfig) {
      const colour = getFeatureColour(feature, layerConfig);

      return {
        pane: layerConfig.pane,
        color: colour,
        weight: getFeatureLineWidth(feature),
        opacity: 0.95,
        fillColor: colour,
        fillOpacity: 0.25
      };
    }


    function createBrStationIcon() {
      return L.divIcon({
        className: "br-station-icon",
        html: '<img class="br-logo-marker" src="https://upload.wikimedia.org/wikipedia/commons/f/f2/British_Rail_Emblem.png" alt="British Rail logo" />',
        iconSize: [30, 20],
        iconAnchor: [15, 10],
        popupAnchor: [0, -10]
      });
    }

    function createSolidCircleMarkerIcon(colour) {
      return L.divIcon({
        className: "",
        html: `<span class="solid-circle-marker" style="--marker-colour: ${colour};"></span>`,
        iconSize: [10, 10],
        iconAnchor: [5, 5],
        popupAnchor: [0, -7]
      });
    }

    function getPointLatLng(feature) {
      if (
        !feature.geometry ||
        feature.geometry.type !== "Point" ||
        !Array.isArray(feature.geometry.coordinates)
      ) {
        return null;
      }

      const lng = feature.geometry.coordinates[0];
      const lat = feature.geometry.coordinates[1];

      if (!Number.isFinite(lat) || !Number.isFinite(lng)) {
        return null;
      }

      return {
        lat: lat,
        lng: lng
      };
    }

    function getCoordinatePoint(coordinates) {
      if (!Array.isArray(coordinates) || coordinates.length < 2) {
        return null;
      }

      const lng = coordinates[0];
      const lat = coordinates[1];

      if (!Number.isFinite(lat) || !Number.isFinite(lng)) {
        return null;
      }

      return {
        lat: lat,
        lng: lng
      };
    }

    function metresPoint(point) {
      const latScale = 111320;
      const lngScale = 111320 * Math.cos(DEFAULT_LAT * Math.PI / 180);

      return {
        x: point.lng * lngScale,
        y: point.lat * latScale
      };
    }

    function metresBetween(a, b) {
      const ax = metresPoint(a);
      const bx = metresPoint(b);
      const dx = ax.x - bx.x;
      const dy = ax.y - bx.y;

      return Math.sqrt(dx * dx + dy * dy);
    }

    function formatRailDistance(distanceMetres) {
      if (!Number.isFinite(distanceMetres)) {
        return "";
      }

      if (distanceMetres >= 1000) {
        return (distanceMetres / 1000).toFixed(1) + " km";
      }

      return Math.round(distanceMetres) + " m";
    }

    function getTrackCoordinateLines(feature) {
      if (!feature.geometry) {
        return [];
      }

      if (feature.geometry.type === "LineString") {
        return [feature.geometry.coordinates];
      }

      if (feature.geometry.type === "MultiLineString") {
        return feature.geometry.coordinates;
      }

      return [];
    }

    function createMinHeap() {
      return [];
    }

    function heapPush(heap, item) {
      heap.push(item);

      let index = heap.length - 1;

      while (index > 0) {
        const parentIndex = Math.floor((index - 1) / 2);

        if (heap[parentIndex].distance <= item.distance) {
          break;
        }

        heap[index] = heap[parentIndex];
        index = parentIndex;
      }

      heap[index] = item;
    }

    function heapPop(heap) {
      if (heap.length === 0) {
        return null;
      }

      const first = heap[0];
      const last = heap.pop();

      if (heap.length > 0) {
        let index = 0;

        while (true) {
          const leftIndex = index * 2 + 1;
          const rightIndex = leftIndex + 1;

          if (leftIndex >= heap.length) {
            break;
          }

          let childIndex = leftIndex;

          if (
            rightIndex < heap.length &&
            heap[rightIndex].distance < heap[leftIndex].distance
          ) {
            childIndex = rightIndex;
          }

          if (heap[childIndex].distance >= last.distance) {
            break;
          }

          heap[index] = heap[childIndex];
          index = childIndex;
        }

        heap[index] = last;
      }

      return first;
    }

    function buildRailGraph() {
      const graph = {
        nodes: [],
        nodeByKey: {},
        segments: []
      };

      function getNodeIndex(point) {
        const key = point.lng.toFixed(6) + "," + point.lat.toFixed(6);

        if (graph.nodeByKey[key] !== undefined) {
          return graph.nodeByKey[key];
        }

        const metres = metresPoint(point);
        const index = graph.nodes.length;

        graph.nodeByKey[key] = index;
        graph.nodes.push({
          lat: point.lat,
          lng: point.lng,
          x: metres.x,
          y: metres.y,
          edges: []
        });

        return index;
      }

      trackFeatures.forEach(feature => {
        getTrackCoordinateLines(feature).forEach(line => {
          let previousIndex = null;

          line.forEach(coordinates => {
            const point = getCoordinatePoint(coordinates);

            if (!point) {
              previousIndex = null;
              return;
            }

            const index = getNodeIndex(point);

            if (previousIndex !== null && previousIndex !== index) {
              const distance = metresBetween(graph.nodes[previousIndex], graph.nodes[index]);

              graph.nodes[previousIndex].edges.push({
                to: index,
                distance: distance
              });

              graph.nodes[index].edges.push({
                to: previousIndex,
                distance: distance
              });

              graph.segments.push({
                from: previousIndex,
                to: index,
                distance: distance
              });
            }

            previousIndex = index;
          });
        });
      });

      connectNearbyGraphNodes(graph, RAIL_GRAPH_CONNECT_TOLERANCE_METRES);

      return graph;
    }

    function connectNearbyGraphNodes(graph, toleranceMetres) {
      if (!Number.isFinite(toleranceMetres) || toleranceMetres <= 0) {
        return;
      }

      const cellSize = toleranceMetres;
      const cells = {};

      function getCellKey(cellX, cellY) {
        return cellX + "," + cellY;
      }

      graph.nodes.forEach((node, index) => {
        const cellX = Math.floor(node.x / cellSize);
        const cellY = Math.floor(node.y / cellSize);

        for (let offsetX = -1; offsetX <= 1; offsetX++) {
          for (let offsetY = -1; offsetY <= 1; offsetY++) {
            const cell = cells[getCellKey(cellX + offsetX, cellY + offsetY)] || [];

            cell.forEach(otherIndex => {
              const otherNode = graph.nodes[otherIndex];
              const distance = Math.sqrt(
                Math.pow(node.x - otherNode.x, 2) +
                Math.pow(node.y - otherNode.y, 2)
              );

              if (distance > 0 && distance <= toleranceMetres) {
                node.edges.push({
                  to: otherIndex,
                  distance: distance
                });

                otherNode.edges.push({
                  to: index,
                  distance: distance
                });
              }
            });
          }
        }

        const key = getCellKey(cellX, cellY);

        if (!cells[key]) {
          cells[key] = [];
        }

        cells[key].push(index);
      });
    }

    function findNearestGraphSegment(graph, point) {
      if (!point || graph.segments.length === 0) {
        return null;
      }

      const metres = metresPoint(point);
      let best = null;

      graph.segments.forEach(segment => {
        const from = graph.nodes[segment.from];
        const to = graph.nodes[segment.to];
        const dx = to.x - from.x;
        const dy = to.y - from.y;
        const lengthSquared = dx * dx + dy * dy;

        if (lengthSquared === 0) {
          return;
        }

        const t = Math.max(
          0,
          Math.min(
            1,
            ((metres.x - from.x) * dx + (metres.y - from.y) * dy) / lengthSquared
          )
        );

        const projected = {
          x: from.x + t * dx,
          y: from.y + t * dy
        };

        const snapDistance = Math.sqrt(
          Math.pow(metres.x - projected.x, 2) +
          Math.pow(metres.y - projected.y, 2)
        );

        if (!best || snapDistance < best.snapDistance) {
          best = {
            from: segment.from,
            to: segment.to,
            t: t,
            snapDistance: snapDistance,
            connections: [
              {
                index: segment.from,
                distance: segment.distance * t
              },
              {
                index: segment.to,
                distance: segment.distance * (1 - t)
              }
            ]
          };
        }
      });

      return best;
    }

    function getShortestRailDistances(graph, startConnections) {
      const distances = new Array(graph.nodes.length).fill(Infinity);
      const heap = createMinHeap();

      startConnections.forEach(connection => {
        if (connection.distance < distances[connection.index]) {
          distances[connection.index] = connection.distance;
          heapPush(heap, {
            index: connection.index,
            distance: connection.distance
          });
        }
      });

      while (heap.length > 0) {
        const current = heapPop(heap);

        if (!current || current.distance !== distances[current.index]) {
          continue;
        }

        graph.nodes[current.index].edges.forEach(edge => {
          const nextDistance = current.distance + edge.distance;

          if (nextDistance < distances[edge.to]) {
            distances[edge.to] = nextDistance;
            heapPush(heap, {
              index: edge.to,
              distance: nextDistance
            });
          }
        });
      }

      return distances;
    }

    function isRailDistanceLayer(layerName) {
      return layerName === "Locs" || layerName === "Signals" || layerName === "Points";
    }

    function calculateNearestAccessByRail() {
      const graph = buildRailGraph();

      if (graph.nodes.length === 0 || accessFeatures.length === 0) {
        return;
      }

      const snappedAccess = accessFeatures
        .map(item => {
          const point = getPointLatLng(item.feature);
          const nearest = findNearestGraphSegment(graph, point);

          if (!nearest) {
            return null;
          }

          return {
            id: item.id,
            feature: item.feature,
            layer: item.layer,
            connections: nearest.connections,
            snapDistance: nearest.snapDistance
          };
        })
        .filter(Boolean);

      railDistanceFeatures.forEach(item => {
        const point = getPointLatLng(item.feature);
        const nearest = findNearestGraphSegment(graph, point);

        if (!nearest) {
          return;
        }

        const distances = getShortestRailDistances(graph, nearest.connections);
        let best = null;

        snappedAccess.forEach(accessItem => {
          let railDistance = Infinity;

          accessItem.connections.forEach(connection => {
            const connectionDistance = distances[connection.index] + connection.distance;

            if (connectionDistance < railDistance) {
              railDistance = connectionDistance;
            }
          });

          if (!Number.isFinite(railDistance)) {
            return;
          }

          const totalDistance = nearest.snapDistance + railDistance + accessItem.snapDistance;

          if (!best || totalDistance < best.distance) {
            best = {
              access: accessItem,
              distance: totalDistance
            };
          }
        });

        if (!best) {
          return;
        }

        item.feature.properties = item.feature.properties || {};
        item.feature.properties.nearest_access_id = best.access.id;
        item.feature.properties.nearest_access_name = getFeatureName(best.access.feature);
        item.feature.properties.nearest_access_distance_m = Math.round(best.distance);
      });
    }

    function nearestAccessLinks(feature, layerName) {
      if (!isRailDistanceLayer(layerName)) {
        return "";
      }

      const p = feature.properties || {};

      if (!p.nearest_access_id || !p.nearest_access_name) {
        return "";
      }

      return `
        <div class="popup-row">
          <strong>Nearest access by rail:</strong>
          <a href="#" onclick="openNearestAccess('${p.nearest_access_id}'); return false;">
            ${p.nearest_access_name}
          </a>
          ${formatRailDistance(p.nearest_access_distance_m)}
        </div>
      `;
    }

    function navigationLinks(feature, layerName) {
      if (layerName !== "Access") {
        return "";
      }

      const point = getPointLatLng(feature);

      if (!point) {
        return "";
      }

      const lat = encodeURIComponent(point.lat);
      const lng = encodeURIComponent(point.lng);
      const destination = `${lat},${lng}`;

      return `
        <a
          class="popup-link"
          href="https://www.google.com/maps/dir/?api=1&destination=${destination}"
          target="_blank"
          rel="noopener noreferrer"
        >
          Navigate with Google Maps
        </a>
      `;
    }

    function padEquipmentNumber(value) {
  if (value === null || value === undefined) {
    return "";
  }

  var digitsOnly = String(value).replace(/\D/g, "");

  if (!digitsOnly) {
    return "";
  }

  while (digitsOnly.length < 12) {
    digitsOnly = "0" + digitsOnly;
  }

  return digitsOnly;
}

    function normaliseAssetType(value) {
      return String(value || "").trim().toLowerCase();
    }

    function assetProfileLinks(feature, layerName) {
      var p = feature.properties || {};
      var equipmentNumbers = p.equipment_number;
      var entries = [];

      /*
        Use the feature type from the GeoJSON first.
        Fall back to the layer name only if the GeoJSON has no type.
      */
      var assetType = normaliseAssetType(p.type || p.Type || layerName);

      if (Array.isArray(equipmentNumbers)) {
        entries = equipmentNumbers;
      } else if (equipmentNumbers) {
        entries = [equipmentNumbers];
      }

      if (entries.length === 0) {
        return "";
      }

      var html = "";

      for (var i = 0; i < entries.length; i++) {
        var entry = entries[i];
        var equipmentNumber = "";
        var equipmentName = "";

        if (entry && typeof entry === "object") {
          equipmentNumber = entry.number || entry.equipment_number || "";
          equipmentName = entry.name || entry.label || "";
        } else {
          equipmentNumber = entry;
        }

        var paddedEquipmentNumber = padEquipmentNumber(equipmentNumber);

        if (!paddedEquipmentNumber) {
          continue;
        }

        var linkText = "Open MyIM asset profile";

        if (assetType === "axle counters" || assetType === "axle counter") {
          if (equipmentName) {
            linkText = "Open MyIM axle counter " + equipmentName + " head profile";
          } else if (entries.length > 1) {
            linkText = "Open MyIM axle counter head profile " + (i + 1);
          } else {
            linkText = "Open MyIM axle counter head profile";
          }
        } else if (assetType === "treadles" || assetType === "treadle") {
          if (equipmentName) {
            linkText = "Open MyIM treadle " + equipmentName + " profile";
          } else if (entries.length > 1) {
            linkText = "Open MyIM treadle profile " + (i + 1);
          } else {
            linkText = "Open MyIM treadle profile";
          }
        } else if (assetType === "tracks" || assetType === "track") {
          linkText = "Open MyIM track profile";
        } else if (assetType === "points" || assetType === "point") {
          linkText = "Open MyIM point profile";
        }

        html += `
          <a
            class="popup-link"
            href="https://myim.ii.networkrail.co.uk/assetProfileHistory/${paddedEquipmentNumber}"
            target="_blank"
            rel="noopener noreferrer"
          >
            ${linkText}
          </a>
        `;
      }

      return html;
    }

    function popupContent(feature, layerName) {
      const p = feature.properties || {};
      const name = getFeatureName(feature);

      const code = p.code || p.Code || p["ref:crs"] || "";
      const type = p.type || p.Type || layerName || "";
      const notes = p.notes || p.Notes || "";

      const description =
        p.description ||
        p.Description ||
        p.source_description ||
        "";

      const photoUrl =
        p.photo_url ||
        p.PhotoURL ||
        "";

      const mediaLinks =
        p.photo_urls ||
        p.gx_media_links ||
        p.source_gx_media_links ||
        "";

      const linkUrl =
        p.link_url ||
        p.LinkURL ||
        p.drawing_url ||
        p.DrawingURL ||
        p.link ||
        p.Link ||
        "";

      let html = `<div class="popup-title">${name}</div>`;

      if (code) {
        html += `<div class="popup-row"><strong>Code:</strong> ${code}</div>`;
      }

      if (notes) {
        html += `<div class="popup-row">${notes}</div>`;
      }

      if (description && description !== notes) {
        html += `<div class="popup-description">${description}</div>`;
      }

      if (photoUrl && !description.includes(photoUrl)) {
        html += `<img class="popup-photo" src="${photoUrl}" alt="${name}" />`;
      }

      if (mediaLinks && typeof mediaLinks === "string" && mediaLinks.startsWith("http")) {
        const links = mediaLinks
          .split(/[,\s]+/)
          .filter(link => link.startsWith("http"));

        links.forEach((url, index) => {
          if (!description.includes(url) && url !== photoUrl) {
            html += `<a class="popup-link" href="${url}" target="_blank" rel="noopener noreferrer">Open photo ${index + 1}</a>`;
          }
        });
      }

      if (linkUrl) {
        html += `<a class="popup-link" href="${linkUrl}" target="_blank" rel="noopener noreferrer">Open link</a>`;
      }

      html += assetProfileLinks(feature, layerName);
      html += nearestAccessLinks(feature, layerName);
      html += navigationLinks(feature, layerName);

      return html;
    }

    function openNearestAccess(accessId) {
      const accessItem = accessLayerById[accessId];

      if (!accessItem) {
        return;
      }

      zoomToLayer(accessItem.layer);
    }

    function zoomToLayer(layer) {
      if (layer.getBounds) {
        map.fitBounds(layer.getBounds(), {
          padding: [50, 50],
          maxZoom: MAX_MAP_ZOOM
        });
      } else if (layer.getLatLng) {
        map.setView(layer.getLatLng(), MAX_MAP_ZOOM);
      }

      layer.openPopup();
    }


    function showUserLocation(event) {
      const latlng = event.latlng;
      const accuracy = event.accuracy || 0;

      if (userLocationMarker) {
        userLocationMarker.setLatLng(latlng);
      } else {
        userLocationMarker = L.circleMarker(latlng, {
          pane: "userLocationPane",
          radius: 3,
          color: "#0055ff",
          weight: 3,
          fillColor: "#0055ff",
          fillOpacity: 1
        }).addTo(map);
      }

      if (userAccuracyCircle) {
        userAccuracyCircle.setLatLng(latlng);
        userAccuracyCircle.setRadius(accuracy);
      } else {
        userAccuracyCircle = L.circle(latlng, {
          pane: "userLocationPane",
          radius: accuracy,
          color: "#0055ff",
          weight: 1,
          fillColor: "#0055ff",
          fillOpacity: 0.12
        }).addTo(map);
      }

      userLocationMarker.openPopup();
    }

    function handleLocationError(error) {
      alert("Could not get your location: " + error.message);
    }

    function locateUser() {
      map.locate({
        setView: true,
        maxZoom: 18,
        enableHighAccuracy: true,
        watch: false
      });
    }

    map.on("locationfound", showUserLocation);
    map.on("locationerror", handleLocationError);

    const locateControl = L.control({
      position: "bottomleft"
    });

    locateControl.onAdd = function() {
      const button = L.DomUtil.create("button", "locate-button");
      button.type = "button";
      button.title = "Show my location";
      button.innerHTML = "⌖";

      L.DomEvent.disableClickPropagation(button);
      L.DomEvent.on(button, "click", function(event) {
        L.DomEvent.preventDefault(event);
        locateUser();
      });

      return button;
    };

    locateControl.addTo(map);

    function updateSuggestions() {
      const searchText = document
        .getElementById("searchBox")
        .value
        .trim()
        .toLowerCase();

      const suggestionsBox = document.getElementById("suggestions");

      suggestionsBox.innerHTML = "";

      if (!searchText) {
        suggestionsBox.style.display = "none";
        return;
      }

      const matches = allFeatures
        .map(item => {
          return {
            item: item,
            rank: getSearchRank(item, searchText)
          };
        })
        .filter(result => result.rank < 999)
        .sort((a, b) => {
          return a.rank - b.rank;
        })
        .slice(0, 10)
        .map(result => result.item);

      if (matches.length === 0) {
        suggestionsBox.style.display = "none";
        return;
      }

      matches.forEach(item => {
        const div = document.createElement("div");

        div.className = "suggestion-item";
        div.textContent = `${getFeatureName(item.feature)} — ${item.layerName}`;

        div.onclick = function() {
          document.getElementById("searchBox").value = getFeatureName(item.feature);
          suggestionsBox.style.display = "none";
          zoomToLayer(item.layer);
        };

        suggestionsBox.appendChild(div);
      });

      suggestionsBox.style.display = "block";
    }

    function handleSearchKey(event) {
      if (event.key === "Enter") {
        document.getElementById("suggestions").style.display = "none";
        searchFeature();
      }

      if (event.key === "Escape") {
        document.getElementById("suggestions").style.display = "none";
      }
    }

    function searchFeature() {
      const searchBox = document.getElementById("searchBox");
      const searchText = searchBox.value.trim().toLowerCase();

      searchBox.value = "";
      document.getElementById("suggestions").style.display = "none";

      if (!searchText) {
        return;
      }

      const rankedMatches = allFeatures
        .map(item => {
          return {
            item: item,
            rank: getSearchRank(item, searchText)
          };
        })
        .filter(result => result.rank < 999)
        .sort((a, b) => {
          return a.rank - b.rank;
        });

      const found = rankedMatches.length > 0 ? rankedMatches[0].item : null;

      if (!found) {
        alert("No matching item found");
        return;
      }

      zoomToLayer(found.layer);
    }

    document.addEventListener("click", function(event) {
      const searchPanel = document.querySelector(".top-panel");

      if (!searchPanel.contains(event.target)) {
        document.getElementById("suggestions").style.display = "none";
      }
    });

    function toggleMapControls() {
      const button = document.getElementById("mapControlsButton");
      const content = document.getElementById("mapControlsContent");

      if (!button || !content) {
        return;
      }

      const isOpen = content.classList.toggle("open");
      button.classList.toggle("open", isOpen);
    }

    function switchBaseLayer(baseLayerName) {
      const selectedBaseLayer = baseMaps[baseLayerName];

      if (!selectedBaseLayer || selectedBaseLayer === currentBaseLayer) {
        return;
      }

      Object.keys(baseMaps).forEach(name => {
        if (map.hasLayer(baseMaps[name])) {
          map.removeLayer(baseMaps[name]);
        }
      });

      selectedBaseLayer.addTo(map);
      currentBaseLayer = selectedBaseLayer;
    }

    function createControlRow(input, text) {
      const row = document.createElement("label");
      row.className = "map-control-row";
      row.appendChild(input);
      row.appendChild(document.createTextNode(text));
      return row;
    }

    function buildMapControlPanel() {
      const button = document.getElementById("mapControlsButton");
      const baseContainer = document.getElementById("baseLayerControls");
      const overlayContainer = document.getElementById("overlayLayerControls");
      const labelContainer = document.getElementById("labelLayerControls");

      if (!button || !baseContainer || !overlayContainer || !labelContainer) {
        return;
      }

      button.onclick = toggleMapControls;

      baseContainer.innerHTML = "";
      overlayContainer.innerHTML = "";
      labelContainer.innerHTML = "";

      Object.keys(baseMaps).forEach(baseLayerName => {
        const radio = document.createElement("input");
        radio.type = "radio";
        radio.name = "base-layer";
        radio.checked = baseMaps[baseLayerName] === currentBaseLayer;

        radio.onchange = function() {
          if (radio.checked) {
            switchBaseLayer(baseLayerName);
          }
        };

        baseContainer.appendChild(createControlRow(radio, baseLayerName));
      });

      Object.keys(tileOverlayMaps).forEach(overlayName => {
        const layer = tileOverlayMaps[overlayName];
        const checkbox = document.createElement("input");

        checkbox.type = "checkbox";
        checkbox.checked = map.hasLayer(layer);

        checkbox.onchange = function() {
          if (checkbox.checked) {
            layer.addTo(map);
          } else {
            map.removeLayer(layer);
          }
        };

        overlayContainer.appendChild(createControlRow(checkbox, overlayName));
      });

      LAYER_CONFIGS.forEach(layerConfig => {
        const layer = overlayMaps[layerConfig.name];

        if (!layer) {
          return;
        }

        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.checked = map.hasLayer(layer);

        checkbox.onchange = function() {
          if (checkbox.checked) {
            layer.addTo(map);
          } else {
            map.removeLayer(layer);
          }

          updateLabelVisibility();
        };

        overlayContainer.appendChild(createControlRow(checkbox, layerConfig.name));
      });

      LAYER_CONFIGS.forEach(layerConfig => {
        if (layerConfig.name === "Chromium") {
          return;
        }

        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.checked = !!labelSettings[layerConfig.name];

        checkbox.onchange = function() {
          labelSettings[layerConfig.name] = checkbox.checked;
          updateLabelVisibility();
        };

        labelContainer.appendChild(createControlRow(checkbox, layerConfig.name));
      });
    }

    function updateLabelVisibility() {
      const labelsShouldShow = map.getZoom() >= LABEL_MIN_ZOOM;

      labelledFeatures.forEach(item => {
        const featureIsVisible = map.hasLayer(item.layer);
        const layerLabelsEnabled = !!labelSettings[item.layerName];

        if (labelsShouldShow && featureIsVisible && layerLabelsEnabled) {
          item.layer.openTooltip();
        } else {
          item.layer.closeTooltip();
        }
      });
    }

    function addLabelControl() {
      const labelControl = L.control({
        position: "topright"
      });

      labelControl.onAdd = function() {
        const div = L.DomUtil.create("div", "label-control");

        div.innerHTML = '<div class="label-control-title">Labels</div>';

        LAYER_CONFIGS.forEach(layerConfig => {
          const row = document.createElement("label");
          row.className = "label-control-row";

          const checkbox = document.createElement("input");
          checkbox.type = "checkbox";
          checkbox.checked = !!labelSettings[layerConfig.name];

          checkbox.onchange = function() {
            labelSettings[layerConfig.name] = checkbox.checked;
            updateLabelVisibility();
          };

          row.appendChild(checkbox);
          row.appendChild(document.createTextNode(layerConfig.name));
          div.appendChild(row);
        });

        L.DomEvent.disableClickPropagation(div);
        L.DomEvent.disableScrollPropagation(div);

        return div;
      };

      labelControl.addTo(map);
    }

    map.on("zoomend overlayadd overlayremove", updateLabelVisibility);

    async function loadLayer(layerConfig) {
      const response = await fetch(layerConfig.file);

      if (!response.ok) {
        throw new Error(`Could not load ${layerConfig.file}. HTTP status: ${response.status}`);
      }

      const data = await response.json();

      const layer = L.geoJSON(data, {
        pane: layerConfig.pane,

        style: function(feature) {
          return styleFeature(feature, layerConfig);
        },

        pointToLayer: function(feature, latlng) {
          if (layerConfig.iconType === "brLogo") {
            return L.marker(latlng, {
              pane: layerConfig.pane,
              icon: createBrStationIcon()
            });
          }

          const colour = getFeatureColour(feature, layerConfig);

          return L.marker(latlng, {
            pane: "pointMarkerPane",
            icon: createSolidCircleMarkerIcon(colour)
          });
        },

        onEachFeature: function(feature, leafletLayer) {
          leafletLayer.bindPopup(function() {
            return popupContent(feature, layerConfig.name);
          });

          leafletLayer.bindTooltip(getFeatureName(feature), {
            permanent: false,
            direction: "top",
            offset: [0, -8],
            className: "feature-label",
            opacity: 1
          });

          labelledFeatures.push({
            feature: feature,
            layer: leafletLayer,
            layerName: layerConfig.name
          });

          allFeatures.push({
            feature: feature,
            layer: leafletLayer,
            layerName: layerConfig.name
          });

          if (layerConfig.name === "Access" || layerConfig.name === "Stations") {
            const accessPrefix = layerConfig.name === "Stations" ? "station" : "access";
            const accessId = accessPrefix + "-" + accessFeatures.length;
            const accessItem = {
              id: accessId,
              feature: feature,
              layer: leafletLayer
            };

            accessFeatures.push(accessItem);
            accessLayerById[accessId] = accessItem;
          }

          if (isRailDistanceLayer(layerConfig.name)) {
            railDistanceFeatures.push({
              feature: feature,
              layer: leafletLayer,
              layerName: layerConfig.name
            });
          }

          if (layerConfig.name === "Tracks") {
            trackFeatures.push(feature);
          }
        }
      });

      overlayMaps[layerConfig.name] = layer;

      if (layerConfig.showOnLoad) {
        layer.addTo(map);
      }

      return layer;
    }

    async function loadAllLayers() {
      const loadedLayers = [];
      const loadErrors = [];

      for (const layerConfig of LAYER_CONFIGS) {
        try {
          const layer = await loadLayer(layerConfig);
          loadedLayers.push(layer);
        } catch (error) {
          console.error(error);
          loadErrors.push(`${layerConfig.name}: ${error.message}`);
        }
      }

      calculateNearestAccessByRail();

      buildMapControlPanel();

      updateLabelVisibility();

      if (loadErrors.length > 0) {
        alert(
          "Some layers could not be loaded:\n\n" +
          loadErrors.join("\n")
        );
      }
    }

    loadAllLayers();
  </script>
</body>
